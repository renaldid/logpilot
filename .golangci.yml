version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - bodyclose

linters-settings:
  govet:
    enable-all: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
